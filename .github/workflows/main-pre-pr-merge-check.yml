name: Main Pre-PR Merge Check

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  checks: read

concurrency:
  group: main-pre-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Main Pre-PR Merge Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ensure PR source branch is test
        shell: bash
        run: |
          set -euo pipefail
          echo "Base: ${{ github.base_ref }}"
          echo "Head: ${{ github.head_ref }}"

          if [ "${{ github.head_ref }}" != "test" ]; then
            echo "Only PRs from the 'test' branch can be merged into 'main'."
            echo "Open the PR from: test -> main"
            exit 1
          fi

      - name: Require successful test-branch robust validation on head commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const requiredCheckName = 'Test Post-Merge Robust Check';

            core.info(`Checking for '${requiredCheckName}' on head SHA: ${sha}`);

            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              filter: 'latest',
              per_page: 100,
            });

            const matches = data.check_runs.filter((cr) => cr.name === requiredCheckName);
            if (!matches.length) {
              core.setFailed(
                `Required check '${requiredCheckName}' has not run on commit ${sha}. ` +
                  `Wait for the test branch workflow to complete, or push to 'test' to trigger it.`
              );
              return;
            }

            const success = matches.some((cr) => cr.conclusion === 'success');
            if (!success) {
              const summary = matches
                .map((cr) => `${cr.status}:${cr.conclusion ?? 'null'} (id:${cr.id})`)
                .join(', ');
              core.setFailed(
                `Required check '${requiredCheckName}' is not successful on commit ${sha}. ` +
                  `Current: ${summary}`
              );
              return;
            }

            core.info(`OK: Found successful '${requiredCheckName}' on commit ${sha}.`);
