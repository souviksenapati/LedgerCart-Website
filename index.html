<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon_dark.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="/favicon.png" media="(prefers-color-scheme: dark)" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LedgerCart – IT Services, Cybersecurity & ERP</title>
  <meta name="description"
    content="LedgerCart delivers custom software, cybersecurity, and ERP solutions to help teams modernize operations and scale with confidence." />
  <meta name="robots" content="index, follow" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ea580c" />

  <!-- Open Graph / Twitter (baseline defaults; route-level tags set in-app) -->
  <meta property="og:site_name" content="LedgerCart" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="LedgerCart – IT Services, Cybersecurity & ERP" />
  <meta property="og:description"
    content="LedgerCart delivers custom software, cybersecurity, and ERP solutions to help teams modernize operations and scale with confidence." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:image:alt" content="LedgerCart – IT Services, Cybersecurity & ERP" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LedgerCart – IT Services, Cybersecurity & ERP" />
  <meta name="twitter:description"
    content="LedgerCart delivers custom software, cybersecurity, and ERP solutions to help teams modernize operations and scale with confidence." />
  <meta name="twitter:image" content="/og-image.png" />
  <meta name="twitter:image:alt" content="LedgerCart – IT Services, Cybersecurity & ERP" />

  <!-- Preload primary font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Database Preconnect (Vite replaces %ENV%) -->
  <link rel="preconnect" href="%VITE_SUPABASE_URL%">

  <!-- Render-blocking CSS to prevent unstyled React mount -->
  <link rel="stylesheet" href="/src/index.css" />

  <!-- FOUC Prevention Script -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('ledgercart-theme') || 'system';
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) { document.documentElement.classList.add('dark'); }
      } catch (e) { }
    })();
  </script>

  <style>
    /* Base neutral colors required before CSS loads to prevent flash */
    html {
      background-color: #ffffff;
      color: #111827;
    }

    html.dark {
      background-color: #0a0f1a;
      color: #f8fafc;
    }

    /* Pre-React Skeleton Styles */
    .app-loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
    }

    .app-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(249, 115, 22, 0.2);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }

    .skeleton-line {
      background: rgba(148, 163, 184, 0.15);
      border-radius: 999px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="app-loader-wrapper">
      <div class="app-spinner"></div>
      <div class="skeleton-line" style="width: 160px; height: 12px; margin-bottom: 12px;"></div>
      <div class="skeleton-line" style="width: 120px; height: 12px;"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
